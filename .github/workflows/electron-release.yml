name: Build & Release Electron

on:
  push:
    branches: [master]
    paths:
      - 'electron/**'
      - 'public/iSoTienda3D.png'
      - 'public/logo.ico'

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Auto-increment patch version
        id: pkg
        run: |
          $json = Get-Content package.json | ConvertFrom-Json
          $parts = $json.version -split '\.'
          $parts[2] = [int]$parts[2] + 1
          $newVersion = $parts -join '.'
          $json.version = $newVersion
          $json | ConvertTo-Json -Depth 10 | Set-Content package.json
          echo "version=$newVersion" >> $env:GITHUB_OUTPUT
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add package.json
          git commit -m "chore: bump version to $newVersion [skip ci]"
          git push

      - name: Build Electron app
        run: npm run electron:build

      - name: Publish GitHub Release
        run: |
          $v = "${{ steps.pkg.outputs.version }}"
          gh release create "v$v" `
            "release\Soporte Sekunet Setup $v.exe" `
            "release\Soporte Sekunet Setup $v.exe.blockmap" `
            "release\latest.yml" `
            --title "Soporte Sekunet v$v" `
            --notes "Release automatico v$v" `
            --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
