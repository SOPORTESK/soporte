name: Build & Release Electron

on:
  push:
    branches: [master]
    paths:
      - 'electron/**'
      - 'public/logo.png'
      - 'public/logo.ico'
      - 'package.json'

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Get version from package.json
        id: pkg
        run: |
          $v = (Get-Content package.json | ConvertFrom-Json).version
          echo "version=$v" >> $env:GITHUB_OUTPUT

      - name: Check if release already exists
        id: check
        run: |
          $tag = "v${{ steps.pkg.outputs.version }}"
          $res = gh release view $tag --repo ${{ github.repository }} 2>&1
          if ($LASTEXITCODE -eq 0) {
            echo "exists=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "exists=false" >> $env:GITHUB_OUTPUT
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron app
        if: steps.check.outputs.exists == 'false'
        run: npm run electron:build

      - name: Publish GitHub Release
        if: steps.check.outputs.exists == 'false'
        run: |
          $tag = "v${{ steps.pkg.outputs.version }}"
          gh release create $tag `
            "release\Soporte Sekunet Setup ${{ steps.pkg.outputs.version }}.exe" `
            "release\Soporte Sekunet Setup ${{ steps.pkg.outputs.version }}.exe.blockmap" `
            "release\latest.yml" `
            --title "Soporte Sekunet v${{ steps.pkg.outputs.version }}" `
            --notes "Release automatico v${{ steps.pkg.outputs.version }}" `
            --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
