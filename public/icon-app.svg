<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <clipPath id="rounded">
      <rect width="512" height="512" rx="115" ry="115"/>
    </clipPath>
  </defs>
  <!-- Fondo degradado azul oscuro -->
  <rect width="512" height="512" rx="115" ry="115" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1f4a"/>
      <stop offset="100%" stop-color="#1a3a8f"/>
    </linearGradient>
  </defs>
  <!-- Logo centrado, sin fondo blanco usando mix-blend-mode multiply -->
  <image
    href="/iSoTienda3D.png"
    x="56" y="56" width="400" height="400"
    clip-path="url(#rounded)"
    style="mix-blend-mode:multiply"
  />
</svg>
