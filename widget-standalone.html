<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soporte Sekunet</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; }

    .root { display: flex; flex-direction: column; height: 100vh; max-width: 420px; margin: 0 auto; background: #fff; box-shadow: 0 0 40px rgba(0,0,0,.12); }

    /* Header */
    .header { background: linear-gradient(135deg,#1d4ed8,#2563eb); padding: 14px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .header-avatar { width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,.2); color: #fff; font-weight: 700; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .header-title { color: #fff; font-weight: 700; font-size: 15px; }
    .header-sub { color: rgba(255,255,255,.8); font-size: 11px; display: flex; align-items: center; gap: 4px; margin-top: 1px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; display: inline-block; }

    /* Form */
    .form { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 10px; }
    .form-title { font-size: 16px; font-weight: 700; color: #0f172a; }
    .form-sub { font-size: 13px; color: #64748b; margin-bottom: 4px; }
    label { font-size: 12px; font-weight: 600; color: #374151; }
    input { border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 10px 12px; font-size: 14px; outline: none; font-family: inherit; color: #0f172a; width: 100%; transition: border-color .15s; }
    input:focus { border-color: #2563eb; }
    .err { color: #dc2626; font-size: 12px; }
    .btn-primary { margin-top: 6px; padding: 12px; border-radius: 10px; background: linear-gradient(135deg,#1d4ed8,#2563eb); color: #fff; border: none; cursor: pointer; font-weight: 600; font-size: 14px; font-family: inherit; transition: opacity .15s; }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }

    /* Messages */
    .messages { flex: 1; overflow-y: auto; padding: 12px 14px; background: #f8fafc; display: flex; flex-direction: column; gap: 8px; }
    .empty { text-align: center; color: #94a3b8; font-size: 13px; margin-top: 40px; }

    /* Bubbles */
    .bubble-wrap { display: flex; }
    .bubble-wrap.user { justify-content: flex-end; }
    .bubble-wrap.agent { justify-content: flex-start; }
    .bubble { max-width: 78%; border-radius: 18px; padding: 9px 13px; font-size: 13px; line-height: 1.5; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .bubble.user { background: linear-gradient(135deg,#1d4ed8,#2563eb); color: #fff; border-radius: 18px 18px 4px 18px; }
    .bubble.agent { background: linear-gradient(135deg,#065f46,#059669); color: #fff; border-radius: 18px 18px 18px 4px; }
    .bubble.ia { background: linear-gradient(135deg,#6d28d9,#7c3aed); color: #fff; border-radius: 18px 18px 18px 4px; }
    .bubble-label { font-size: 10px; font-weight: 700; opacity: .85; margin-bottom: 3px; }
    .bubble-text { white-space: pre-wrap; word-break: break-word; }
    .bubble-time { font-size: 10px; opacity: .7; text-align: right; margin-top: 4px; }

    /* Input bar */
    .input-bar { display: flex; align-items: flex-end; gap: 8px; padding: 10px 12px; border-top: 1px solid #e2e8f0; background: #fff; flex-shrink: 0; }
    textarea { flex: 1; border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 9px 12px; font-size: 13px; resize: none; font-family: inherit; outline: none; color: #0f172a; max-height: 100px; overflow-y: auto; transition: border-color .15s; }
    textarea:focus { border-color: #2563eb; }
    .send-btn { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg,#1d4ed8,#2563eb); color: #fff; border: none; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity .15s; }
    .send-btn:disabled { opacity: .45; cursor: not-allowed; }
    .powered { text-align: center; font-size: 10px; color: #94a3b8; padding: 4px 0 6px; background: #fff; }
  </style>
</head>
<body>
<div class="root">
  <div class="header">
    <div class="header-avatar">S</div>
    <div>
      <div class="header-title">Soporte Sekunet</div>
      <div class="header-sub"><span class="dot"></span> En línea</div>
    </div>
  </div>

  <!-- FORM -->
  <div class="form" id="form-section">
    <p class="form-title">¡Hola! 👋 Antes de comenzar</p>
    <p class="form-sub">Ingresa tus datos para conectarte con un agente.</p>
    <label for="inp-nombre">Nombre *</label>
    <input id="inp-nombre" placeholder="Tu nombre" autocomplete="name" />
    <label for="inp-correo">Correo (opcional)</label>
    <input id="inp-correo" type="email" placeholder="tu@correo.com" autocomplete="email" />
    <p class="err" id="form-err"></p>
    <button class="btn-primary" id="btn-start">Iniciar chat →</button>
  </div>

  <!-- CHAT -->
  <div id="chat-section" style="display:none;flex:1;flex-direction:column;min-height:0;overflow:hidden;">
    <div class="messages" id="messages"></div>
    <div class="input-bar">
      <textarea id="txt-msg" rows="1" placeholder="Escribe un mensaje… (Enter envía)"></textarea>
      <button class="send-btn" id="btn-send" disabled>➤</button>
    </div>
    <div class="powered">Powered by <strong>Sekunet</strong></div>
  </div>
</div>

<!-- Supabase JS directo desde CDN — sin servidor -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
(function () {
  /* ── CONFIG — estas son las únicas variables que necesitas ── */
  var SUPABASE_URL  = "https://kzcyxeracvfxynddyjld.supabase.co";
  var SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6Y3l4ZXJhY3ZmeHluZGR5amxkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MTE5NTQsImV4cCI6MjA5MTA4Nzk1NH0.DvEnK-g5rMxzFec4Fl3rJ5VDYVJ7-ua9ssqf3s-QKtU";
  /* ─────────────────────────────────────────────────────────── */

  var db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  var sessionId = null;
  try { sessionId = sessionStorage.getItem("sek_session"); } catch(e){}

  /* ── Helpers ── */
  function fmt(iso) {
    if (!iso) return "";
    return new Date(iso).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  function $id(id) { return document.getElementById(id); }

  /* ── Render mensajes ── */
  var renderedIds = new Set();

  function renderMsg(m) {
    if (renderedIds.has(m.id)) return;
    renderedIds.add(m.id);

    var wrap = document.createElement("div");
    wrap.className = "bubble-wrap " + (m.role === "user" ? "user" : "agent");

    var bubble = document.createElement("div");
    var cls = "bubble ";
    if (m.role === "user") cls += "user";
    else if (m.role === "assistant") cls += "ia";
    else cls += "agent";
    bubble.className = cls;

    if (m.role !== "user") {
      var lbl = document.createElement("div");
      lbl.className = "bubble-label";
      lbl.textContent = m.role === "assistant" ? "🤖 Asistente" : "💬 Agente";
      bubble.appendChild(lbl);
    }

    var txt = document.createElement("div");
    txt.className = "bubble-text";
    txt.textContent = m.content || "";
    bubble.appendChild(txt);

    var time = document.createElement("div");
    time.className = "bubble-time";
    time.textContent = fmt(m.time);
    bubble.appendChild(time);

    wrap.appendChild(bubble);
    $id("messages").appendChild(wrap);
    $id("messages").scrollTop = $id("messages").scrollHeight;
  }

  function renderAll(histcliente, histtecnico) {
    var all = [];
    (histcliente || []).forEach(function(e, i) { all.push({ id: "c" + i, role: e.role || "user", content: e.content, time: e.time }); });
    (histtecnico || []).forEach(function(e, i) { all.push({ id: "t" + i, role: "tecnico", content: e.content, time: e.time }); });
    all.sort(function(a,b){ return new Date(a.time) - new Date(b.time); });
    all.forEach(renderMsg);
  }

  /* ── Polling de respuestas del agente ── */
  var pollTimer = null;
  function startPolling() {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(async function () {
      if (!sessionId) return;
      var res = await db.from("sek_cases")
        .select("histcliente, histtecnico")
        .eq("id", sessionId)
        .maybeSingle();
      if (res.data) renderAll(res.data.histcliente, res.data.histtecnico);
    }, 4000);
  }

  /* ── Mostrar chat ── */
  function showChat(histcliente, histtecnico) {
    $id("form-section").style.display = "none";
    var cs = $id("chat-section");
    cs.style.display = "flex";
    cs.style.flexDirection = "column";
    cs.style.flex = "1";
    cs.style.minHeight = "0";
    cs.style.overflow = "hidden";

    if (!histcliente || histcliente.length === 0) {
      renderMsg({ id: "welcome", role: "assistant", content: "¡Hola! 👋 Somos el equipo de soporte de Sekunet. ¿En qué podemos ayudarte hoy?", time: new Date().toISOString() });
    } else {
      renderAll(histcliente, histtecnico);
    }
    startPolling();
  }

  /* ── Iniciar sesión ── */
  $id("btn-start").addEventListener("click", async function () {
    var nombre = $id("inp-nombre").value.trim();
    var correo = $id("inp-correo").value.trim();
    if (!nombre) { $id("form-err").textContent = "Por favor ingresa tu nombre."; return; }
    $id("form-err").textContent = "";
    $id("btn-start").disabled = true;
    $id("btn-start").textContent = "Conectando…";

    /* Si ya hay sesión, recuperarla */
    if (sessionId) {
      var check = await db.from("sek_cases").select("id,histcliente,histtecnico").eq("id", sessionId).eq("canal","widget").maybeSingle();
      if (check.data) { showChat(check.data.histcliente, check.data.histtecnico); return; }
    }

    /* Crear nuevo caso */
    var ins = await db.from("sek_cases").insert({
      title: "Chat web — " + nombre,
      canal: "widget",
      estado: "abierto",
      prioridad: "media",
      cliente: { nombre: nombre, correo: correo },
      histcliente: [],
      histtecnico: []
    }).select("id,histcliente,histtecnico").single();

    if (ins.error) {
      $id("form-err").textContent = "Error al conectar: " + ins.error.message;
      $id("btn-start").disabled = false;
      $id("btn-start").textContent = "Iniciar chat →";
      return;
    }

    sessionId = String(ins.data.id);
    try { sessionStorage.setItem("sek_session", sessionId); } catch(e){}
    showChat(ins.data.histcliente, ins.data.histtecnico);
  });

  /* ── Enviar mensaje ── */
  async function sendMsg() {
    var txt = $id("txt-msg").value.trim();
    if (!txt || !sessionId) return;
    $id("btn-send").disabled = true;
    $id("txt-msg").value = "";

    /* Optimista */
    renderMsg({ id: "opt-" + Date.now(), role: "user", content: txt, time: new Date().toISOString() });

    /* Leer historial actual y agregar entrada */
    var res = await db.from("sek_cases").select("histcliente").eq("id", sessionId).maybeSingle();
    var hist = Array.isArray(res.data && res.data.histcliente) ? res.data.histcliente : [];
    hist.push({ role: "user", time: new Date().toISOString(), content: txt });
    await db.from("sek_cases").update({ histcliente: hist }).eq("id", sessionId);
    $id("btn-send").disabled = false;
  }

  $id("btn-send").addEventListener("click", sendMsg);
  $id("txt-msg").addEventListener("input", function() {
    $id("btn-send").disabled = !this.value.trim();
  });
  $id("txt-msg").addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  });

  /* ── Restaurar sesión previa ── */
  if (sessionId) {
    db.from("sek_cases").select("id,histcliente,histtecnico").eq("id", sessionId).eq("canal","widget").maybeSingle().then(function(res) {
      if (res.data) showChat(res.data.histcliente, res.data.histtecnico);
    });
  }
})();
</script>
</body>
</html>
