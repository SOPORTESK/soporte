<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soporte Sekunet</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; }

    .root { display: flex; flex-direction: column; height: 100vh; max-width: 420px; margin: 0 auto; background: #fff; box-shadow: 0 0 40px rgba(0,0,0,.12); }

    /* Header */
    .header { background: linear-gradient(135deg,#1d4ed8,#2563eb); padding: 14px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .header-avatar { width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,.2); color: #fff; font-weight: 700; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .header-title { color: #fff; font-weight: 700; font-size: 15px; }
    .header-sub { color: rgba(255,255,255,.8); font-size: 11px; display: flex; align-items: center; gap: 4px; margin-top: 1px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; display: inline-block; }

    /* Form */
    .form { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 10px; }
    .form-title { font-size: 16px; font-weight: 700; color: #0f172a; }
    .form-sub { font-size: 13px; color: #64748b; margin-bottom: 4px; }
    label { font-size: 12px; font-weight: 600; color: #374151; }
    input { border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 10px 12px; font-size: 14px; outline: none; font-family: inherit; color: #0f172a; width: 100%; transition: border-color .15s; }
    input:focus { border-color: #2563eb; }
    .err { color: #dc2626; font-size: 12px; }
    .btn-primary { margin-top: 6px; padding: 12px; border-radius: 10px; background: linear-gradient(135deg,#1d4ed8,#2563eb); color: #fff; border: none; cursor: pointer; font-weight: 600; font-size: 14px; font-family: inherit; transition: opacity .15s; }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }

    /* Messages */
    .messages { flex: 1; overflow-y: auto; padding: 12px 14px; background: #f8fafc; display: flex; flex-direction: column; gap: 8px; }
    .empty { text-align: center; color: #94a3b8; font-size: 13px; margin-top: 40px; }

    /* Bubbles */
    .bubble-wrap { display: flex; }
    .bubble-wrap.user { justify-content: flex-end; }
    .bubble-wrap.agent { justify-content: flex-start; }
    .bubble { max-width: 78%; border-radius: 18px; padding: 9px 13px; font-size: 13px; line-height: 1.5; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .bubble.user { background: linear-gradient(135deg,#1d4ed8,#2563eb); color: #fff; border-radius: 18px 18px 4px 18px; }
    .bubble.agent { background: linear-gradient(135deg,#065f46,#059669); color: #fff; border-radius: 18px 18px 18px 4px; }
    .bubble.ia { background: linear-gradient(135deg,#6d28d9,#7c3aed); color: #fff; border-radius: 18px 18px 18px 4px; }
    .bubble-label { font-size: 10px; font-weight: 700; opacity: .85; margin-bottom: 3px; }
    .bubble-text { white-space: pre-wrap; word-break: break-word; }
    .bubble-time { font-size: 10px; opacity: .7; text-align: right; margin-top: 4px; }

    /* Input bar */
    .input-bar { display: flex; align-items: flex-end; gap: 8px; padding: 10px 12px; border-top: 1px solid #e2e8f0; background: #fff; flex-shrink: 0; }
    textarea { flex: 1; border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 9px 12px; font-size: 13px; resize: none; font-family: inherit; outline: none; color: #0f172a; max-height: 100px; overflow-y: auto; transition: border-color .15s; }
    textarea:focus { border-color: #2563eb; }
    .send-btn { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg,#1d4ed8,#2563eb); color: #fff; border: none; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity .15s; }
    .send-btn:disabled { opacity: .45; cursor: not-allowed; }
    .powered { text-align: center; font-size: 10px; color: #94a3b8; padding: 4px 0 6px; background: #fff; }

    /* Indicador de escritura */
    @keyframes dotBounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
    .dot-bounce { display:inline-block; width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,0.8); animation:dotBounce 1.2s infinite ease-in-out; }
  </style>
</head>
<body>
<div class="root">
  <div class="header">
    <div class="header-avatar">S</div>
    <div>
      <div class="header-title">Soporte Sekunet</div>
      <div class="header-sub"><span class="dot"></span> En línea</div>
    </div>
  </div>

  <!-- FORM -->
  <div class="form" id="form-section">
    <p class="form-title">¡Hola! 👋 Antes de comenzar</p>
    <p class="form-sub">Ingresa tus datos para conectarte con un agente.</p>
    <label for="inp-nombre">Nombre y apellido *</label>
    <input id="inp-nombre" placeholder="Nombre completo" autocomplete="name" />
    <label for="inp-correo">Correo electrónico *</label>
    <input id="inp-correo" type="email" placeholder="tu@correo.com" autocomplete="email" />
    <label for="inp-tel">Número de contacto *</label>
    <input id="inp-tel" type="tel" placeholder="+506 8888-8888" autocomplete="tel" />
    <label for="inp-empresa">Empresa registrada *</label>
    <input id="inp-empresa" placeholder="Nombre de su empresa" autocomplete="organization" />
    <p class="err" id="form-err"></p>
    <button class="btn-primary" id="btn-start">Iniciar chat →</button>
  </div>

  <!-- CHAT -->
  <div id="chat-section" style="display:none;flex:1;flex-direction:column;min-height:0;overflow:hidden;">
    <div class="messages" id="messages"></div>
    <div class="input-bar">
      <textarea id="txt-msg" rows="1" placeholder="Escribe un mensaje… (Enter envía)"></textarea>
      <button class="send-btn" id="btn-send" disabled>➤</button>
    </div>
    <div class="powered">Powered by <strong>Sekunet</strong></div>
  </div>
</div>

<!-- Supabase JS directo desde CDN — sin servidor -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
(function () {
  /* ── CONFIG — estas son las únicas variables que necesitas ── */
  var SUPABASE_URL  = "https://kzcyxeracvfxynddyjld.supabase.co";
  var SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6Y3l4ZXJhY3ZmeHluZGR5amxkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MTE5NTQsImV4cCI6MjA5MTA4Nzk1NH0.DvEnK-g5rMxzFec4Fl3rJ5VDYVJ7-ua9ssqf3s-QKtU";
  /* ─────────────────────────────────────────────────────────── */

  var db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  var sessionId = null;
  try { sessionId = localStorage.getItem("sek_session"); } catch(e){}

  /* ── Helpers ── */
  function fmt(iso) {
    if (!iso) return "";
    return new Date(iso).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  function $id(id) { return document.getElementById(id); }

  /* ── Render completo (reemplaza todo el DOM de mensajes) ── */
  function makeBubble(role, content, time, mediaUrl, mediaType, fileName) {
    var wrap = document.createElement("div");
    wrap.className = "bubble-wrap " + (role === "user" ? "user" : "agent");
    var bubble = document.createElement("div");
    var cls = "bubble ";
    if (role === "user") cls += "user";
    else if (role === "assistant") cls += "ia";
    else cls += "agent";
    bubble.className = cls;
    if (role !== "user") {
      var lbl = document.createElement("div");
      lbl.className = "bubble-label";
      lbl.textContent = role === "assistant" ? "🤖 Asistente" : "💬 Agente";
      bubble.appendChild(lbl);
    }
    var txt = document.createElement("div");
    txt.className = "bubble-text";

    if (mediaUrl) {
      var mt = mediaType || "";
      var fname = fileName || decodeURIComponent(mediaUrl.split("/").pop().split("?")[0]) || "archivo";
      if (mt.startsWith("image/")) {
        var img = document.createElement("img");
        img.src = mediaUrl; img.style.cssText = "max-width:100%;border-radius:8px;display:block;margin-bottom:6px;"; img.alt = fname;
        txt.appendChild(img);
      } else if (mt.startsWith("video/")) {
        var vid = document.createElement("video");
        vid.src = mediaUrl; vid.controls = true; vid.style.cssText = "max-width:100%;border-radius:8px;display:block;margin-bottom:6px;";
        txt.appendChild(vid);
      } else if (mt.startsWith("audio/")) {
        var aud = document.createElement("audio");
        aud.src = mediaUrl; aud.controls = true; aud.style.cssText = "width:100%;margin-bottom:6px;";
        txt.appendChild(aud);
      }
      var dlLink = document.createElement("a");
      dlLink.href = mediaUrl; dlLink.download = fname; dlLink.target = "_blank";
      dlLink.style.cssText = "display:inline-flex;align-items:center;gap:5px;font-size:11px;color:inherit;opacity:.9;text-decoration:underline;";
      dlLink.textContent = "⬇ " + fname;
      txt.appendChild(dlLink);
    } else {
      txt.textContent = content || "";
    }

    bubble.appendChild(txt);
    var t = document.createElement("div");
    t.className = "bubble-time";
    t.textContent = fmt(time);
    bubble.appendChild(t);
    wrap.appendChild(bubble);
    return wrap;
  }

  function renderAll(histcliente, histtecnico) {
    var all = [];
    (histcliente || []).forEach(function(e) { all.push({ role: e.role || "user", content: e.content, mediaUrl: e.mediaUrl, mediaType: e.mediaType, fileName: e.fileName, time: e.time }); });
    (histtecnico || []).forEach(function(e) { if (e.role === "nota") return; all.push({ role: "tecnico", content: e.content, mediaUrl: e.mediaUrl, mediaType: e.mediaType, fileName: e.fileName, time: e.time }); });
    all.sort(function(a,b){ return new Date(a.time) - new Date(b.time); });

    var container = $id("messages");
    /* Preservar mensajes optimistas pendientes */
    var optimistas = [];
    container.querySelectorAll(".optimista").forEach(function(el) { optimistas.push(el); });

    container.innerHTML = "";

    if (all.length === 0) {
      var bienvenida = makeBubble("assistant", "¡Hola! 👋 Somos el equipo de soporte de Sekunet. ¿En qué podemos ayudarte hoy?", new Date().toISOString());
      container.appendChild(bienvenida);
    }

    all.forEach(function(m) { container.appendChild(makeBubble(m.role, m.content, m.time, m.mediaUrl, m.mediaType, m.fileName)); });

    /* Re-agregar optimistas que aún no tienen respaldo en DB */
    optimistas.forEach(function(el) { container.appendChild(el); });

    container.scrollTop = container.scrollHeight;
  }

  /* ── Indicador "agente escribiendo" ── */
  var typingEl = null;
  function showAgentTyping(visible) {
    var container = $id("messages");
    if (visible && !typingEl) {
      typingEl = document.createElement("div");
      typingEl.className = "bubble-wrap agent typing-indicator";
      typingEl.innerHTML = '<div class="bubble agent" style="padding:10px 14px"><div style="display:flex;gap:5px;align-items:center"><span class="dot-bounce" style="animation-delay:0ms"></span><span class="dot-bounce" style="animation-delay:150ms"></span><span class="dot-bounce" style="animation-delay:300ms"></span><span style="font-size:10px;opacity:.8;margin-left:4px">Agente escribiendo…</span></div></div>';
      container.appendChild(typingEl);
      container.scrollTop = container.scrollHeight;
    } else if (!visible && typingEl) {
      typingEl.remove(); typingEl = null;
    }
  }

  /* ── Realtime + polling de respaldo ── */
  var realtimeChannel = null;
  var presenceChannel = null;
  var typingTimer = null;
  var pollTimer = null;

  async function fetchAndRender() {
    if (!sessionId) return;
    var res = await db.from("sek_cases").select("histcliente,histtecnico").eq("id", sessionId).maybeSingle();
    if (res.data) renderAll(res.data.histcliente, res.data.histtecnico);
  }

  function startRealtime() {
    if (realtimeChannel) { try { db.removeChannel(realtimeChannel); } catch(e){} }
    if (presenceChannel) { try { db.removeChannel(presenceChannel); } catch(e){} }
    if (pollTimer) clearInterval(pollTimer);

    /* Canal de mensajes */
    realtimeChannel = db.channel("wgt-msgs-" + sessionId)
      .on("postgres_changes", {
        event: "UPDATE", schema: "public", table: "sek_cases",
        filter: "id=eq." + sessionId
      }, function(payload) {
        if (payload.new) renderAll(payload.new.histcliente, payload.new.histtecnico);
      })
      .subscribe(function(status) {
        console.log("[widget] realtime status:", status);
      });

    /* Canal de presence (escritura) — clave distinta */
    presenceChannel = db.channel("wgt-typing-" + sessionId, { config: { presence: { key: "cli-" + sessionId.slice(0,8) } } })
      .on("presence", { event: "sync" }, function() {
        var state = presenceChannel.presenceState();
        var entries = Object.values(state).flat();
        var agentTyping = entries.some(function(e) { return e.role === "agente" && e.typing; });
        showAgentTyping(agentTyping);
      })
      .subscribe();

    /* Polling de respaldo cada 5s por si Realtime falla */
    pollTimer = setInterval(fetchAndRender, 5000);
  }

  function emitTyping() {
    if (!presenceChannel) return;
    presenceChannel.track({ role: "cliente", typing: true });
    clearTimeout(typingTimer);
    typingTimer = setTimeout(function() {
      if (presenceChannel) presenceChannel.track({ role: "cliente", typing: false });
    }, 2000);
  }

  /* ── Mostrar chat ── */
  function showChat(histcliente, histtecnico) {
    $id("form-section").style.display = "none";
    var cs = $id("chat-section");
    cs.style.display = "flex";
    cs.style.flexDirection = "column";
    cs.style.flex = "1";
    cs.style.minHeight = "0";
    cs.style.overflow = "hidden";
    renderAll(histcliente, histtecnico);
    startRealtime();
  }

  /* ── Iniciar sesión ── */
  $id("btn-start").addEventListener("click", async function () {
    var nombre  = $id("inp-nombre").value.trim();
    var correo  = $id("inp-correo").value.trim();
    var tel     = $id("inp-tel").value.trim();
    var empresa = $id("inp-empresa").value.trim();
    if (!nombre)  { $id("form-err").textContent = "Por favor ingresa tu nombre y apellido."; return; }
    if (!correo)  { $id("form-err").textContent = "Por favor ingresa tu correo."; return; }
    if (!tel)     { $id("form-err").textContent = "Por favor ingresa tu número de contacto."; return; }
    if (!empresa) { $id("form-err").textContent = "Por favor ingresa el nombre de tu empresa."; return; }
    $id("form-err").textContent = "";
    $id("btn-start").disabled = true;
    $id("btn-start").textContent = "Conectando…";

    /* Si ya hay sesión, recuperarla */
    if (sessionId) {
      var check = await db.from("sek_cases").select("id,histcliente,histtecnico").eq("id", sessionId).eq("canal","widget").maybeSingle();
      if (check.data) { showChat(check.data.histcliente, check.data.histtecnico); return; }
    }

    /* Crear nuevo caso */
    var ins = await db.from("sek_cases").insert({
      title: "Chat web — " + nombre,
      canal: "widget",
      estado: "abierto",
      prioridad: "media",
      cliente: { nombre: nombre, correo: correo, telefono: tel, cuenta: empresa },
      histcliente: [],
      histtecnico: []
    }).select("id,histcliente,histtecnico").single();

    if (ins.error) {
      $id("form-err").textContent = "Error al conectar: " + ins.error.message;
      $id("btn-start").disabled = false;
      $id("btn-start").textContent = "Iniciar chat →";
      return;
    }

    sessionId = String(ins.data.id);
    try { localStorage.setItem("sek_session", sessionId); } catch(e){}
    showChat(ins.data.histcliente, ins.data.histtecnico);
  });

  /* ── Enviar mensaje ── */
  async function sendMsg() {
    var txt = $id("txt-msg").value.trim();
    if (!txt || !sessionId) return;
    $id("btn-send").disabled = true;
    $id("txt-msg").value = "";

    /* Burbuja optimista con clase para preservarla */
    var optWrap = makeBubble("user", txt, new Date().toISOString());
    optWrap.classList.add("optimista");
    var container = $id("messages");
    container.appendChild(optWrap);
    container.scrollTop = container.scrollHeight;

    /* Leer historial actual y agregar entrada */
    var res = await db.from("sek_cases").select("histcliente").eq("id", sessionId).maybeSingle();
    var hist = (res.data && Array.isArray(res.data.histcliente)) ? res.data.histcliente : [];
    hist.push({ role: "user", time: new Date().toISOString(), content: txt });
    await db.from("sek_cases").update({ histcliente: hist }).eq("id", sessionId);
    /* Realtime disparará renderAll y eliminará el optimista automáticamente */
    $id("btn-send").disabled = false;
  }

  $id("btn-send").addEventListener("click", sendMsg);
  $id("txt-msg").addEventListener("input", function() {
    $id("btn-send").disabled = !this.value.trim();
    emitTyping();
  });
  $id("txt-msg").addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  });

  /* ── Restaurar sesión previa automáticamente ── */
  if (sessionId) {
    db.from("sek_cases").select("id,histcliente,histtecnico,estado").eq("id", sessionId).eq("canal","widget").maybeSingle().then(function(res) {
      if (res.data) {
        showChat(res.data.histcliente, res.data.histtecnico);
      } else {
        /* Sesión expirada o eliminada — limpiar */
        try { localStorage.removeItem("sek_session"); } catch(e){}
        sessionId = null;
      }
    });
  }
})();
</script>
</body>
</html>
